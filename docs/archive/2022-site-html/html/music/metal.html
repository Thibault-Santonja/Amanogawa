<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <title>Tablatures playground</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;500;800&display=swap"
    rel="stylesheet" />

  <style type="text/css">
    :root {
      --menu-width: 9rem;

      --logo-main-color: rgba(18, 141, 245, 255);
      --tab-strings: #000;
      --tab-note-secondary: #888;
      --arial: arial;
    }

    body {
      font-family: 'M PLUS Rounded 1c', helvetica, verdana;
      font-weight: 300;
    }

    #web-sidebar {
      width: var(--menu-width);
    }

    #page-content {
      width: calc(100vw - var(--menu-width));
      /* "size of the page" - "#web-sidebar size" */
    }


    .Cwt2ia {
      fill: var(--logo-main-color);
    }

    .Cwta4 {
      display: block;
      padding: 9px 6px;
    }

    .D2820n {
      position: relative;
    }

    .D28105 svg {
      font-family: var(--arial);
      font-size: 13px;
      font-weight: 300;
    }

    .Cw81bf {
      shape-rendering: auto;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: block;
      margin: 0 auto;
      max-height: 100%;
      page-break-inside: avoid;
      text-rendering: optimizeLegibility;
      -webkit-user-select: none;
      user-select: none;
      width: 100%;
    }

    .B6413b {
      stroke-width: 1.1;
      stroke: var(--tab-strings);
      stroke-linecap: square;
      stroke-width: 1;
      fill: none;
      vector-effect: non-scaling-stroke;
      shape-rendering: optimizespeed;
    }

    .h8e1 {
      fill: black;
    }

    .h82c6,
    .h82d8,
    .h8cd {
      fill: var(--tab-note-secondary);
    }

    .h81p9 {
      text-anchor: middle;
      dominant-baseline: middle;
      cursor: default;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>

  <script>
    let mobileSideBar = document.getElementById("mobile-sidebar");
    let mobileMenuVisible = false

    let profileMenu = document.getElementById("profile-menu");
    let profileMenuVisible = false

    const showMobileMenu = () => {
      mobileMenuVisible = !mobileMenuVisible
      if (mobileMenuVisible) {
        mobileSideBar.style.transform = "translateX(0)";
      } else {
        mobileSideBar.style.transform = "translateX(-100%)";
      }
    };

    const showProfileMenu = () => {
      profileMenuVisible = !profileMenuVisible
      if (profileMenuVisible) {
        profileMenu.style.transform = "translateY(0)";
      } else {
        profileMenu.style.transform = "translateY(-100%)";
      }
      profileMenu.classList.toggle("hidden");
    };


    let tablatures = document.getElementsByClassName("tablature")
    let totalTablatures = tablatures.length
    let showedTablatures = Array.apply(null, Array(totalTablatures)).map(function () { return false; })

    const showTablature = (tablatureId) => {
      let tablature = tablatures[tablatureId]
      if (showedTablatures[tablatureId]) {
        tablature.classList.add("hidden");
      } else {
        tablature.classList.remove("hidden");
      }
      showedTablatures[tablatureId] = !showedTablatures[tablatureId]
    }
  </script>
